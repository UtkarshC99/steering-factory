experiment:
  name: qwen-gemma-safety-and-benchmark-study
  seed: 17
  # Labeled-example-count axis for the data-efficiency curve: run_steering
  # extracts one vector per point (subsampling the steer pool) and
  # run_qlora trains one adapter per point (subsampling the train pool).
  # Validation/test are never subsampled, so quality at each N is always
  # measured on identical held-out data. Remove this key to fall back to a
  # single run at the full steer/train pool size (the pre-n_sweep default).
  n_sweep: [8, 16, 32, 64, 128, 256, 512]
artifacts:
  root: /content/steering_factory_artifacts
  publish_root: null
models:
  - id: qwen3_4b
    name_or_path: Qwen/Qwen3-4B
    dtype: bfloat16
    quantization: 4bit
  - id: gemma3_4b
    name_or_path: google/gemma-3-4b-it
    dtype: bfloat16
    quantization: 4bit
splits:
  seed: 17
  steer_fraction: 0.2
  validation_fraction: 0.2
  group_key: category
capability_probe:
  # Benign general-capability regression control (steering_factory/
  # capability_probe.py): measures collateral damage from steering, not
  # just target-behavior quality. Opt-in and off by default because it
  # multiplies generation cost roughly by (num_probes / num_eval_examples)
  # on top of the existing coefficient/layer/method sweep.
  enabled: true
  max_new_tokens: 24
decoding:
  max_new_tokens: 96
  batch_size: 16
extraction:
  batch_size: 16
recipes:
  # Real, gated/licensed benchmark data -- NOT the local_jsonl fixtures in
  # default_colab.yaml. Every recipe below requires
  # `dataset.reviewed_dataset_card: true`, which the corresponding adapter
  # (steering_factory/datasets.py) refuses to load without. That flag is
  # not just a runtime gate: setting it to true is an assertion that a
  # human reviewed the dataset card (terms of use, license, any access
  # request) BEFORE this manifest is run.
  #
  # All four recipes below are set to `true`: every schema (walledai/
  # HarmBench: prompt/context/category, "standard"/"contextual" subsets;
  # walledai/XSTest: prompt/focus/type/note/label, single "test" split,
  # label is the safe/unsafe discriminator; facebook/AbstentionBench:
  # question/reference_answers/should_abstain/metadata_json, requires
  # trust_remote_code=True AND datasets<=3.6.0 -- see
  # AbstentionBenchAdapter's version guard in datasets.py; epfl-dlab/
  # JSONSchemaBench: json_schema/unique_id, "default" subset [9.56K rows,
  # train split 5.75K] plus 10 domain-specific subsets) was confirmed
  # directly against the live HuggingFace dataset viewer and the adapters
  # in datasets.py were corrected to match. Re-verify against the live
  # viewer yourself before trusting a real run if a schema may have
  # changed since.
  - id: harmful_instruction_compliance
    behavior: harmful_instruction_compliance
    dataset:
      adapter: harmbench
      dataset: walledai/HarmBench
      subset: standard
      reviewed_dataset_card: true
    extraction: [mean_diff, pca, whitened_mean_diff, optimized]
    application:
      layers: ["early_mid", "mid", "late_mid"]
      coefficients: [-2, -1, -0.5, 0, 0.5, 1, 2]
      token_scopes: [all, generated_only]
  - id: calibrated_abstention_real
    behavior: appropriate_abstention
    dataset:
      adapter: abstentionbench
      dataset: facebook/AbstentionBench
      reviewed_dataset_card: true  # cc-by-nc-4.0; requires datasets<=3.6.0 -- see AbstentionBenchAdapter's version guard
    extraction: [mean_diff, pca, whitened_mean_diff, optimized]
  - id: structured_output_real
    behavior: structured_output
    dataset:
      adapter: jsonschemabench
      dataset: epfl-dlab/JSONSchemaBench
      subset: default  # confirmed against the live dataset viewer: 9.56K rows, train split 5.75K
      reviewed_dataset_card: true
    extraction: [mean_diff, pca, whitened_mean_diff, optimized]
  - id: benign_over_refusal_control
    # XSTest is a benign control set, not a steer source -- see
    # XSTestAdapter's docstring. Every row normalizes to split="test"
    # regardless of the split plan, so this recipe measures false-refusal
    # under whatever vector the harmful_instruction_compliance recipe
    # extracted; it does not extract its own vector.
    behavior: harmful_instruction_compliance
    dataset:
      adapter: xstest
      dataset: walledai/XSTest
      reviewed_dataset_card: true
finetune:
  backend: qlora
  matched_split: steer
  max_steps: 200
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  batch_size: 4
  gradient_accumulation_steps: 2
