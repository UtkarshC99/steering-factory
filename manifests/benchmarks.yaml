experiment:
  name: qwen-gemma-safety-and-benchmark-study
  seed: 17
  # Labeled-example-count axis for the data-efficiency curve: run_steering
  # extracts one vector per point (subsampling the steer pool) and
  # run_qlora trains one adapter per point (subsampling the train pool).
  # Validation/test are never subsampled, so quality at each N is always
  # measured on identical held-out data. Remove this key to fall back to a
  # single run at the full steer/train pool size (the pre-n_sweep default).
  #
  # [10, 20, 40] instead of [8, 16, 32, 64, 128, 256, 512]: _subsample_n
  # returns the WHOLE steer pool unchanged whenever n >= len(steer)
  # (runner.py) -- with a ~40-example steer pool (see steer_fraction
  # below), every sweep point above 40 was silently re-extracting and
  # re-training on the identical subsample, 6 times over, for zero new
  # information. [10, 20, 40] gives 3 genuinely distinct points spanning
  # the full pool instead of 7 points where only the smallest 1-2 differ.
  n_sweep: [10, 20, 40]
artifacts:
  root: /content/steering_factory_artifacts
  publish_root: null
models:
  - id: qwen3_4b
    name_or_path: Qwen/Qwen3-4B
    dtype: bfloat16
    quantization: 4bit
  - id: gemma3_4b
    name_or_path: google/gemma-3-4b-it
    dtype: bfloat16
    quantization: 4bit
splits:
  seed: 17
  # Raised from the framework default (0.2) to 0.4: this does NOT increase
  # generation cost (that scales with validation+test, not steer) -- it
  # only costs a little more extraction/training time -- but it directly
  # controls how many n_sweep points are non-redundant (see the n_sweep
  # comment above). At max_records: 100 below, steer_fraction: 0.4 gives
  # steer=40, validation=20, test=40 -- n_test clears the comparison
  # report's own min_split_size=20 honesty floor with margin, and the
  # n_sweep=[10,20,40] points span the whole steer pool instead of being
  # bunched at the low end of a ~12-example pool.
  steer_fraction: 0.4
  validation_fraction: 0.2
  group_key: category
capability_probe:
  # Benign general-capability regression control (steering_factory/
  # capability_probe.py): measures collateral damage from steering, not
  # just target-behavior quality. Opt-in and off by default because it
  # multiplies generation cost roughly by (num_probes / num_eval_examples)
  # on top of the existing coefficient/layer/method sweep.
  enabled: true
  max_new_tokens: 24
decoding:
  max_new_tokens: 96
  # Raised from 16 to 32: a live run reported 8.6/22.5 GB VRAM used at
  # batch_size=16 (~13.9 GB headroom). Memory scales roughly linearly with
  # batch size once fixed model weights (~3 GB) are subtracted out, so
  # batch=32 is estimated at ~14 GB -- comfortable 2x margin under the L4's
  # 22.5 GB, not batch=48+ which the same linear estimate puts closer to
  # ~20 GB (too close to the edge given decode-time activation memory
  # doesn't scale perfectly linearly, and a mid-run OOM costs more time
  # than a conservative bump saves). Also used by the QLoRA eval arm. If
  # you see OOM at 32, drop back to 16 or 24.
  batch_size: 32
extraction:
  # Extraction is plain forward passes (no autoregression, no retained
  # scores) -- strictly cheaper per row than generation -- so it can safely
  # match or exceed decoding.batch_size.
  batch_size: 32
recipes:
  # Real, gated/licensed benchmark data -- NOT the local_jsonl fixtures in
  # default_colab.yaml. Every recipe below requires
  # `dataset.reviewed_dataset_card: true`, which the corresponding adapter
  # (steering_factory/datasets.py) refuses to load without. That flag is
  # not just a runtime gate: setting it to true is an assertion that a
  # human reviewed the dataset card (terms of use, license, any access
  # request) BEFORE this manifest is run.
  #
  # All four recipes below are set to `true`: every schema (walledai/
  # HarmBench: prompt/context/category, "standard"/"contextual" subsets;
  # walledai/XSTest: prompt/focus/type/note/label, single "test" split,
  # label is the safe/unsafe discriminator; facebook/AbstentionBench:
  # question/reference_answers/should_abstain/metadata_json, requires
  # trust_remote_code=True AND datasets<=3.6.0 -- see
  # AbstentionBenchAdapter's version guard in datasets.py; epfl-dlab/
  # JSONSchemaBench: json_schema/unique_id, "default" subset [9.56K rows,
  # train split 5.75K] plus 10 domain-specific subsets) was confirmed
  # directly against the live HuggingFace dataset viewer and the adapters
  # in datasets.py were corrected to match. Re-verify against the live
  # viewer yourself before trusting a real run if a schema may have
  # changed since.
  - id: harmful_instruction_compliance
    behavior: harmful_instruction_compliance
    dataset:
      adapter: harmbench
      dataset: walledai/HarmBench
      subset: standard
      reviewed_dataset_card: true
      # Caps the loaded pool BEFORE stable_split runs, so steer/validation/
      # test still land in the manifest's configured fractions of this
      # smaller pool -- capping after splitting would instead shrink each
      # split unevenly. Deterministic: same splits.seed -> same subsample
      # (steering_factory.runner._subsample_n), so results are reproducible
      # and comparable across a re-run at the same value. Raised from 60 to
      # 100 alongside steer_fraction: 0.4 above -- spends the larger pool
      # on held-out volume (n_test=40, double the report's floor) rather
      # than grid density.
      max_records: 100
    # Dropped `optimized` (BiPO-lite) for this first pass: it's the one
    # extraction method with an unbatched per-pair gradient loop (~40 steps
    # each), the single most expensive method per vector by a wide margin,
    # and orthogonal to the sizing fix here. Re-add it once a cheap first
    # pass confirms the rest of the pipeline end to end.
    extraction: [mean_diff, pca, whitened_mean_diff]
    application:
      # Trimmed from 3 layers x 7 coefficients x 2 token_scopes (42-point
      # grid) to 1 x 3 x 1 for a first pass -- layers/coefficients/scopes
      # are all still real ablation axes worth sweeping, just not all at
      # once against a 224-vector extraction bill on the first run. Widen
      # this back out once one config is confirmed trustworthy.
      layers: ["mid"]
      coefficients: [-1, 0, 1]
      token_scopes: [all]
  - id: calibrated_abstention_real
    behavior: appropriate_abstention
    dataset:
      adapter: abstentionbench
      dataset: facebook/AbstentionBench
      reviewed_dataset_card: true  # cc-by-nc-4.0; requires datasets<=3.6.0 -- see AbstentionBenchAdapter's version guard
      # This recipe's dataset load is the one most likely to fail on a
      # fresh Colab install (the datasets>=3.7 version-guard error) --
      # skip it and continue with the other three recipes rather than
      # aborting the whole run, since fixing the datasets pin usually
      # means a separate environment/session anyway (see README). Every
      # OTHER recipe in this manifest keeps the default (on_load_error:
      # raise, i.e. unset) -- a broken dataset there still stops the run.
      on_load_error: skip
      max_records: 100
    extraction: [mean_diff, pca, whitened_mean_diff]
  - id: structured_output_real
    behavior: structured_output
    dataset:
      adapter: jsonschemabench
      dataset: epfl-dlab/JSONSchemaBench
      subset: default  # confirmed against the live dataset viewer: 9.56K rows, train split 5.75K
      reviewed_dataset_card: true
      max_records: 100
    extraction: [mean_diff, pca, whitened_mean_diff]
    # This recipe's prompts embed a full JSON schema and routinely approach
    # the 1024-token truncation cap, unlike HarmBench's short prompts --
    # decoding.batch_size: 32 above was sized from HarmBench's own observed
    # VRAM usage and is NOT safe here. A real run OOM'd specifically on this
    # recipe (VRAM swinging ~21.8GB -> ~11-14GB -> ~11.5GB batch-to-batch, a
    # real variable-size spike from long-prompt batches, not fragmentation).
    # Halved relative to the manifest default as a conservative fix.
    decoding:
      batch_size: 16
  - id: benign_over_refusal_control
    # XSTest is a benign control set, not a steer source -- see
    # XSTestAdapter's docstring. Every row normalizes to split="test"
    # regardless of the split plan, so this recipe has zero steer examples
    # and extracts no vector of its own. `apply_vectors_from` (runner.py's
    # _apply_vectors_cross_recipe) is what actually wires it up: it
    # evaluates harmful_instruction_compliance's already-extracted vectors,
    # under harmful_instruction_compliance's own application grid, against
    # THIS recipe's benign prompts -- that's the false-refusal measurement.
    # No `extraction`/`application` block needed here.
    behavior: harmful_instruction_compliance
    dataset:
      adapter: xstest
      dataset: walledai/XSTest
      reviewed_dataset_card: true
      max_records: 100
      apply_vectors_from: harmful_instruction_compliance
finetune:
  backend: qlora
  matched_split: steer
  max_steps: 200
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  batch_size: 4
  gradient_accumulation_steps: 2
