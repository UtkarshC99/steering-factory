experiment:
  name: qwen-gemma-safety-and-benchmark-study
  seed: 17
artifacts:
  root: /content/steering_factory_artifacts
  publish_root: null
models:
  - id: qwen3_4b
    name_or_path: Qwen/Qwen3-4B
    dtype: bfloat16
    quantization: 4bit
  - id: gemma3_4b
    name_or_path: google/gemma-3-4b-it
    dtype: bfloat16
    quantization: 4bit
splits:
  seed: 17
  steer_fraction: 0.2
  validation_fraction: 0.2
  group_key: category
decoding:
  max_new_tokens: 96
  batch_size: 16
extraction:
  batch_size: 16
recipes:
  # Real, gated/licensed benchmark data -- NOT the local_jsonl fixtures in
  # default_colab.yaml. Every recipe below requires
  # `dataset.reviewed_dataset_card: true`, which the corresponding adapter
  # (steering_factory/datasets.py) refuses to load without. That flag is
  # not just a runtime gate: setting it to true is an assertion that a
  # human reviewed the dataset card (terms of use, license, any access
  # request) BEFORE this manifest is run -- do that first, on the actual
  # HuggingFace dataset page, not by trusting this file's comments.
  #
  # Schema notes and what still needs live verification are documented in
  # each adapter class's docstring in datasets.py. In particular:
  # HarmBench's exact column names (Behavior/SemanticCategory/BehaviorID)
  # and XSTest's exact column names (prompt/type) were sourced from the
  # published paper/repo documentation, NOT independently confirmed
  # against the live gated dataset viewer from this dev environment --
  # verify both against the real HF dataset viewer once you have access,
  # before trusting a real run's results.
  - id: harmful_instruction_compliance
    behavior: harmful_instruction_compliance
    dataset:
      adapter: harmbench
      dataset: walledai/HarmBench
      subset: standard
      reviewed_dataset_card: false  # set true only after reviewing the HarmBench dataset card yourself
    extraction: [mean_diff, pca, whitened_mean_diff, optimized]
    application:
      layers: ["early_mid", "mid", "late_mid"]
      coefficients: [-2, -1, -0.5, 0, 0.5, 1, 2]
      token_scopes: [all, generated_only]
  - id: calibrated_abstention_real
    behavior: appropriate_abstention
    dataset:
      adapter: abstentionbench
      dataset: facebook/AbstentionBench
      reviewed_dataset_card: false  # set true only after reviewing the AbstentionBench dataset card yourself (cc-by-nc-4.0)
    extraction: [mean_diff, pca, whitened_mean_diff, optimized]
  - id: structured_output_real
    behavior: structured_output
    dataset:
      adapter: jsonschemabench
      dataset: epfl-dlab/JSONSchemaBench
      subset: JsonSchemaStore
      reviewed_dataset_card: false  # set true only after reviewing the JSONSchemaBench dataset card yourself (MIT)
    extraction: [mean_diff, pca, whitened_mean_diff, optimized]
  - id: benign_over_refusal_control
    # XSTest is a benign control set, not a steer source -- see
    # XSTestAdapter's docstring. Every row normalizes to split="test"
    # regardless of the split plan, so this recipe measures false-refusal
    # under whatever vector the harmful_instruction_compliance recipe
    # extracted; it does not extract its own vector.
    behavior: harmful_instruction_compliance
    dataset:
      adapter: xstest
      dataset: walledai/XSTest
      reviewed_dataset_card: false  # set true only after reviewing the XSTest dataset card yourself (CC-BY-4.0)
finetune:
  backend: qlora
  matched_split: steer
  max_steps: 200
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  batch_size: 4
  gradient_accumulation_steps: 2
