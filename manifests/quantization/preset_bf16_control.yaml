# ============================================================================
# PRESET: bf16 control (unquantized anchor)
# ============================================================================
# HYPOTHESIS (H2, the anchor): this run IS "ground truth" -- every other
# preset's steering/QLoRA quality is interpreted as a DELTA from this run's
# quality, not in absolute terms, because absolute quality also depends on
# recipe difficulty and is not itself informative about quantization's
# effect. Nothing here is "confirmed/refuted" on its own; it is the
# reference point H1 (preset_8bit_midpoint.yaml) and H3
# (preset_low_bit_layer_scan.yaml) are measured against.
#
# Both arms matched: quantization: none, dtype: bfloat16 -- unquantized
# weights, bf16 compute throughout (see model_utils.py's bnb_config_for:
# "none" or any non-4/8bit string means "no BitsAndBytesConfig", load at
# `dtype` directly). QLoRA runs plain LoRA on a full-precision base here
# (finetune.py's train_qlora now skips prepare_model_for_kbit_training on
# this path, since that call is only valid/needed for an actually-quantized
# base) -- "QLoRA" as a literal name only applies to the two quantized
# presets; this is LoRA-bf16.
#
# WHY bf16 and not fp32 as "the" unquantized control: bf16 is the compute
# dtype used throughout this whole pipeline already (bnb_4bit_compute_dtype,
# torch_dtype for every load) -- an fp32 run would double memory again for a
# COMPUTE-dtype question (numerical range/precision of the arithmetic) that
# is orthogonal to the WEIGHT-quantization question this matrix is actually
# about. fp16 vs bf16 is the same kind of orthogonal question (numerical
# range, not weight fidelity) and is likewise deliberately excluded --
# see docs/quantization_matrix.md.
#
# Memory sizing (L4, 22.03 GiB actual capacity): bf16 weights are ~2
# bytes/param -- ~8.0 GiB total for a ~4B-param model (4x the 4bit baseline's
# ~2.0 GiB). Using the same linear activation scaling (0.4125 GiB/unit-batch,
# derived from the 4bit baseline's real 8.6 GiB @ batch_size=16 measurement)
# and the same 6.5 GiB safety margin, the max safe batch at bf16 works out to
# ~18 -- batch_size: 16 is set here, a clean number below that estimate, the
# most conservative of the three precision presets since this file ALSO
# widens the layer grid below (more forward/backward passes resident at
# once during a wider sweep). Also relies on the per-vector
# torch.cuda.empty_cache() fix in runner.py.
#
# WHY THIS PRESET ALSO CARRIES A WIDER LAYER SWEEP: bf16 has the most VRAM
# headroom of the three precision levels even at a smaller batch size (no
# quantization overhead competing for the same budget), making it the
# cheapest preset to safely widen -- and widening it here (not in the other
# two) establishes which layer is robust when there is NO quantization noise
# to confound the answer, which is exactly the baseline
# preset_low_bit_layer_scan.yaml's own hypothesis (H3) needs to compare
# against. layers: ["early","mid","late"] triples the extraction/application
# grid vs the other two presets' single "mid" layer; coefficients/methods/
# n_sweep are otherwise held at the baseline's values for comparability.
# ============================================================================
experiment:
  name: quantization-bf16-control
  seed: 17
  n_sweep: [10, 20, 40]
artifacts:
  root: /content/steering_factory_artifacts
  publish_root: null
models:
  - id: qwen3_4b_bf16
    name_or_path: Qwen/Qwen3-4B
    dtype: bfloat16
    quantization: none
  - id: gemma3_4b_bf16
    name_or_path: google/gemma-3-4b-it
    dtype: bfloat16
    quantization: none
splits:
  seed: 17
  steer_fraction: 0.4
  validation_fraction: 0.2
  group_key: category
capability_probe:
  enabled: true
  max_new_tokens: 24
decoding:
  max_new_tokens: 96
  batch_size: 16
extraction:
  batch_size: 16
recipes:
  - id: harmful_instruction_compliance
    behavior: harmful_instruction_compliance
    dataset:
      adapter: harmbench
      dataset: walledai/HarmBench
      subset: standard
      reviewed_dataset_card: true
      max_records: 100
    extraction: [mean_diff, pca, whitened_mean_diff]
    application:
      # Widened vs the other two presets (see header comment): establishes
      # which layer is robust with no quantization noise to confound it.
      layers: ["early", "mid", "late"]
      coefficients: [-1, 0, 1]
      token_scopes: [all]
  - id: calibrated_abstention_real
    behavior: appropriate_abstention
    dataset:
      adapter: abstentionbench
      dataset: facebook/AbstentionBench
      reviewed_dataset_card: true
      on_load_error: skip
      max_records: 100
    extraction: [mean_diff, pca, whitened_mean_diff]
  - id: structured_output_real
    behavior: structured_output
    dataset:
      adapter: jsonschemabench
      dataset: epfl-dlab/JSONSchemaBench
      subset: default
      reviewed_dataset_card: true
      max_records: 100
    extraction: [mean_diff, pca, whitened_mean_diff]
  - id: benign_over_refusal_control
    behavior: harmful_instruction_compliance
    dataset:
      adapter: xstest
      dataset: walledai/XSTest
      reviewed_dataset_card: true
      max_records: 100
      apply_vectors_from: harmful_instruction_compliance
finetune:
  backend: qlora
  matched_split: steer
  max_steps: 200
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  batch_size: 4
  gradient_accumulation_steps: 2
