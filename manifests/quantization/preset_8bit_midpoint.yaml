# ============================================================================
# PRESET: 8bit midpoint
# ============================================================================
# HYPOTHESIS (H1): At matched precision, steering quality is CLOSER to the
# bf16-control quality than QLoRA quality is -- i.e. steering degrades LESS
# than fine-tuning under quantization, because a steering vector is a coarse
# direction estimated from activation diffs, while a LoRA adapter is a
# learned weight delta sitting directly on top of (and therefore more
# sensitive to) the quantized base weights' representational error.
# Falsifiable: if QLoRA's quality gap-to-bf16 is SMALLER than steering's at
# this precision, H1 is refuted for this (model, recipe).
#
# What's held fixed vs preset_4bit_baseline.yaml: every recipe/method/layer/
# coefficient/n_sweep/steer_fraction setting is IDENTICAL. The only variable
# changed vs the baseline is precision (quantization: 8bit here vs 4bit
# there) -- this is deliberate: to isolate the precision effect cleanly, this
# preset does NOT also widen the layer grid or change extraction methods,
# unlike preset_low_bit_layer_scan.yaml, which trades grid width for depth on
# a different hypothesis (H3).
#
# Both arms matched: quantization: 8bit, dtype: bfloat16 (int8 weights, bf16
# compute) -- steering via model_utils.bnb_config_for, QLoRA via the now-
# parameterized finetune.py train/eval loaders (same helper, same inputs).
#
# Memory sizing (L4, 22.03 GiB actual capacity): 8bit weights are ~1
# byte/param vs 4bit's ~0.5 byte/param -- roughly +2.0 GiB vs the 4bit
# baseline's ~2.0 GiB weights (so ~4.0 GiB total weights) for a ~4B-param
# model. Using the same linear activation-memory scaling derived from the
# 4bit baseline's own real measurement (8.6 GiB at batch_size=16, ~0.4125
# GiB/unit-batch) and the same 6.5 GiB safety margin, the max safe batch at
# 8bit works out to ~28 -- batch_size: 24 is set here, below that estimate,
# to keep a real cushion given the fragmentation OOM already observed once
# at the (nominally "safe") 4bit/batch=32 setting. This preset also relies
# on the per-vector torch.cuda.empty_cache() fix in runner.py.
# ============================================================================
experiment:
  name: quantization-8bit-midpoint
  seed: 17
  # Trimmed to [10, 40] (was [10,20,40]) and coefficients/max_records widened
  # to match preset_4bit_baseline.yaml -- see that file's recipe comments for
  # the full rationale. Kept IDENTICAL to the baseline (per this preset's own
  # header: isolate precision cleanly), so every non-precision axis here must
  # track the baseline's values exactly.
  n_sweep: [10, 40]
artifacts:
  root: /content/steering_factory_artifacts
  publish_root: null
models:
  - id: qwen3_4b_8bit
    name_or_path: Qwen/Qwen3-4B
    dtype: bfloat16
    quantization: 8bit
  - id: gemma3_4b_8bit
    name_or_path: google/gemma-3-4b-it
    dtype: bfloat16
    quantization: 8bit
splits:
  seed: 17
  steer_fraction: 0.4
  validation_fraction: 0.2
  group_key: category
capability_probe:
  enabled: true
  max_new_tokens: 24
decoding:
  max_new_tokens: 96
  batch_size: 24
extraction:
  batch_size: 24
recipes:
  - id: harmful_instruction_compliance
    behavior: harmful_instruction_compliance
    dataset:
      adapter: harmbench
      dataset: walledai/HarmBench
      subset: standard
      reviewed_dataset_card: true
      max_records: 150
    extraction: [mean_diff, whitened_mean_diff]
    application:
      layers: ["mid"]
      coefficients: [-2, -1, -0.5, 0, 0.5, 1, 2]
      token_scopes: [all]
  - id: calibrated_abstention_real
    behavior: appropriate_abstention
    dataset:
      adapter: abstentionbench
      dataset: facebook/AbstentionBench
      reviewed_dataset_card: true
      on_load_error: skip
      max_records: 150
    extraction: [mean_diff, whitened_mean_diff]
    application:
      layers: ["mid"]
      coefficients: [-2, -1, -0.5, 0, 0.5, 1, 2]
      token_scopes: [all]
  - id: structured_output_real
    behavior: structured_output
    dataset:
      adapter: jsonschemabench
      dataset: epfl-dlab/JSONSchemaBench
      subset: default
      reviewed_dataset_card: true
      max_records: 150
    extraction: [mean_diff, whitened_mean_diff]
    application:
      layers: ["mid"]
      coefficients: [-2, -1, -0.5, 0, 0.5, 1, 2]
      token_scopes: [all]
    # Same long-prompt OOM risk as preset_4bit_baseline.yaml's identical
    # recipe -- halved relative to this preset's own batch_size: 24.
    decoding:
      batch_size: 12
      # See preset_4bit_baseline.yaml's identical comment.
      max_new_tokens: 256
      max_length: 2048
  - id: benign_over_refusal_control
    behavior: harmful_instruction_compliance
    dataset:
      adapter: xstest
      dataset: walledai/XSTest
      reviewed_dataset_card: true
      max_records: 100
      apply_vectors_from: harmful_instruction_compliance
      apply_adapter_from: harmful_instruction_compliance
finetune:
  backend: qlora
  matched_split: steer
  # Cut from 200 to 25 -- see preset_4bit_baseline.yaml's identical comment
  # (real train-loss log plateaued by step 15-20).
  max_steps: 25
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  batch_size: 4
  gradient_accumulation_steps: 2
